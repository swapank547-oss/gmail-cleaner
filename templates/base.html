<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gmail Bulk Cleaner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="{{ url_for('index') }}" class="nav-brand">Gmail Bulk Cleaner</a>
      <div class="nav-links">
        {% if authenticated %}
          <span class="nav-user">Connected</span>
          <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline">Logout</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Delete thousands of Gmail emails in one go &mdash; no limits.</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
